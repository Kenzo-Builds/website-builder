server {
    listen 80;
    server_name wc.kenzoagent.com;
    root /var/www/wc.kenzoagent.com;
    index index.html;

    add_header Cross-Origin-Embedder-Policy "credentialless" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "cross-origin" always;
    add_header Access-Control-Allow-Origin "https://builder.kenzoagent.com" always;
    add_header Content-Security-Policy "default-src * 'self' data: blob:; script-src * 'self' 'unsafe-inline' 'unsafe-eval' data: blob:; style-src * 'self' 'unsafe-inline'; connect-src * 'self' data: blob: wss: https:; worker-src * 'self' blob:;" always;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
