# ============================================================
# Nginx Config — AI Website Builder (builder.kenzoagent.com)
# ============================================================
# Serves the frontend SPA + proxies API calls to backend (port 3500)
# Three distinct frontend app zones, each with different security headers:
#   /app/wc-runtime/  — WebContainer (needs COEP/COOP for SharedArrayBuffer)
#   /app/build/       — Builder UI (relaxed CSP for Monaco, CDNs, iframes)
#   /app/             — Dashboard (standard CSP)
# ============================================================

server {
    listen 80;
    server_name builder.kenzoagent.com;
    root /var/www/builder.kenzoagent.com;
    index index.html;

    # ── Security Headers (applied globally) ──────────────────────────────────
    # Prevent clickjacking (this site can't be embedded in iframes by others)
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Prevent MIME-type sniffing (browser must trust Content-Type)
    add_header X-Content-Type-Options "nosniff" always;
    # Only send full referrer for same-origin; send just origin for cross-origin
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Force HTTPS for 1 year including all subdomains
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Content Security Policy:
    #   - default: self only
    #   - scripts: self + inline/eval (needed for Monaco) + CDNs (Tailwind, Lucide, Supabase, etc.)
    #   - styles: self + inline + Google Fonts
    #   - fonts: Google Fonts
    #   - images: self + data URIs + blobs + all HTTPS (for picsum, user images)
    #   - connect: self + Supabase + OpenRouter + npm registry (for WebContainers)
    #   - frames: self + blob + all HTTPS (generated site previews run in iframes)
    #   - workers: blob + self (service workers, Monaco web workers)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' cdn.jsdelivr.net cdnjs.cloudflare.com cdn.tailwindcss.com unpkg.com esm.sh; style-src 'self' 'unsafe-inline' fonts.googleapis.com cdnjs.cloudflare.com cdn.tailwindcss.com; font-src fonts.gstatic.com fonts.googleapis.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co https://openrouter.ai wss://*.supabase.co https://registry.npmjs.org https://*.npmjs.com; frame-src 'self' blob: https:; worker-src blob: 'self';" always;

    # ── /api/ — Reverse Proxy to Backend ─────────────────────────────────────
    # All /api/* requests forwarded to Express server on port 3500
    # WebSocket upgrade headers included for future SSE/WS compatibility
    # Long read_timeout (120s) to handle slow AI generations
    location /api/ {
        proxy_pass http://172.18.0.2:3500;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }

    # ── /app/build/ — Builder UI ──────────────────────────────────────────────
    # Relaxed CSP: allows all external scripts/styles for Monaco Editor,
    # Tailwind CDN, Supabase JS, and generated site previews in iframes.
    # SPA routing: 404s fall back to /app/build/index.html
    location /app/build/ {
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Content-Security-Policy "default-src * 'self' data: blob: about:; script-src * 'self' 'unsafe-inline' 'unsafe-eval' data: blob:; style-src * 'self' 'unsafe-inline' data:; font-src * 'self' data:; img-src * 'self' data: blob: https:; connect-src * 'self' data: blob: wss: https:; frame-src * 'self' data: blob: about: https:; worker-src * 'self' blob:;" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri $uri/ /app/build/index.html;
    }

    # ── /app/wc-runtime/ — WebContainer Isolated Runtime ────────────────────
    # CRITICAL: WebContainers require SharedArrayBuffer, which requires:
    #   COEP (Cross-Origin-Embedder-Policy): credentialless
    #   COOP (Cross-Origin-Opener-Policy): same-origin
    # This route is isolated so COEP/COOP don't affect the rest of the app.
    # The wc-runtime iframe is loaded from a SEPARATE subdomain (wc.kenzoagent.com)
    # so these headers don't leak to the parent page.
    location /app/wc-runtime/ {
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Content-Security-Policy "default-src * 'self' data: blob:; script-src * 'self' 'unsafe-inline' 'unsafe-eval' data: blob:; style-src * 'self' 'unsafe-inline'; connect-src * 'self' data: blob: wss:; worker-src * 'self' blob:;" always;
        try_files $uri $uri/ /app/wc-runtime/index.html;
    }

    # ── /app/ — Dashboard SPA ─────────────────────────────────────────────────
    # No-cache headers prevent stale JS/CSS after deploys
    # SPA routing: all paths fall back to /app/index.html
    location /app/ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri $uri/ /app/index.html;
    }

    # ── Static Asset Caching ─────────────────────────────────────────────────
    # CSS, JS, images, fonts → cached for 7 days (604800s)
    # Content-hashed filenames make long cache safe
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # ── Root Fallback — Landing Page ─────────────────────────────────────────
    # Serves the marketing landing page (separate from /app/ SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
